<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم أجهزة الـ PS4 - GameHub</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --border: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
            text-decoration: none;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            flex: 1;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .section-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 35px 25px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: block;
            text-align: right;
        }

        .section-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 12px 30px var(--accent-glow);
        }

        .section-card h3 {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .section-card p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .badge-info {
            display: inline-block;
            font-size: 0.85rem;
            padding: 5px 10px;
            border-radius: 6px;
            background-color: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- شريط التنقل -->
        <nav>
            <a href="index.html" class="logo">🎮 GameHub</a>
            <a href="index.html" class="back-btn">← الرئيسية</a>
        </nav>

        <h1>قسم أجهزة الـ PS4</h1>
        <p class="subtitle">اختر القسم الذي تريد تصفحه للبدء.</p>

        <!-- الأقسام الرئيسية (أزرار كبرى تشبه الإصدارات) -->
        <div class="sections-grid">
            <!-- زر قسم الإصدارات -->
            <a href="versions.html" class="section-card">
                <h3>إصدارات التعديل</h3>
                <p>تصفح إصدارات نظام البلايستيشن (5.05 و 6.72) وطريقة التفعيل.</p>
                <span class="badge-info">⚙️ الأقسام والثغرات</span>
            </a>

            <!-- زر قسم الشروحات والأدلة -->
            <a href="guides.html" class="section-card">
                <h3>قسم الشروحات والأدلة</h3>
                <p>مجموعة من الأدلة والشروحات التفصيلية لاستضافات وأدوات التعديل.</p>
                <span class="badge-info">📚 الأدلة والشروحات</span>
            </a>
        </div>
    </div>

</body>
</html>
